# The whole thing: Postgres, plus the app — which is now also the server. One
# Next process serves the UI, the REST API (/api/goals) and the MCP endpoint
# (/api/mcp), all on the same port.
#
#   docker compose up -d --build
#   curl localhost:3000/api/health
#
# Day to day you usually want only the database, and `npm run dev` for the app:
#
#   docker compose up -d db

services:
  db:
    # pgvector's image, not plain `postgres` — the search index stores embeddings
    # in a `vector` column and the 015 migration does `CREATE EXTENSION vector`,
    # which the stock image can't satisfy. It is the official Postgres image with
    # the extension compiled in, so nothing else about it changes.
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: goals
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goals}
      POSTGRES_DB: goals
    volumes:
      - goals-db:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    # Exposed so you can psql into it while developing, and so the test suite can
    # reach goals_test. Drop this in a shared deployment — the app reaches the
    # database over the compose network regardless.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goals -d goals"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://goals:${POSTGRES_PASSWORD:-goals}@db:5432/goals
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  goals-db:
