name: Release

# Fires when you push a version tag (created by `npm version`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create a GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pull the matching section out of CHANGELOG.md to use as the release body.
      - name: Extract changelog section
        run: node scripts/changelog-section.mjs "${GITHUB_REF_NAME#v}" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
