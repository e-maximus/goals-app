name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Project site (username.github.io/<repo>) needs basePath "/<repo>".
      # A user/org site (repo named "<name>.github.io") is served at the root.
      - name: Compute base path
        id: base
        run: |
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.path }}

      # Tell GitHub Pages not to run Jekyll (which would drop the _next folder).
      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
