name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # The goals server (REST + MCP) is a separate workspace with its own
  # dependencies, and its tests run against a real Postgres — the repo layer is
  # SQL and transactions, which a fake would not exercise.
  server:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: goals
          POSTGRES_PASSWORD: goals
          POSTGRES_DB: goals_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U goals -d goals_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install
        run: npm ci
        working-directory: server

      - name: Typecheck
        run: npm run typecheck
        working-directory: server

      - name: Test
        run: npm test
        working-directory: server
        env:
          TEST_DATABASE_URL: postgres://goals:goals@localhost:5432/goals_test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Pin the browser download to the installed Playwright version.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
