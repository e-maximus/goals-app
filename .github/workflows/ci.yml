name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Lib tests
        run: npm run test:lib

      - name: Build
        run: npm run build

  # The server (REST + MCP) lives in the app now, but its tests still run against
  # a real Postgres — the repo layer is SQL and transactions, which a fake would
  # not exercise.
  server:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: goals
          POSTGRES_PASSWORD: goals
          POSTGRES_DB: goals_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U goals -d goals_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:server
        env:
          TEST_DATABASE_URL: postgres://goals:goals@localhost:5432/goals_test

  e2e:
    runs-on: ubuntu-latest

    # The app now needs Postgres to run at all — the goals live there. Playwright
    # starts the dev server itself, pointed at goals_test via TEST_DATABASE_URL.
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: goals
          POSTGRES_PASSWORD: goals
          POSTGRES_DB: goals_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U goals -d goals_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Pin the browser download to the installed Playwright version.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          TEST_DATABASE_URL: postgres://goals:goals@localhost:5432/goals_test
          # The app is wrapped in ClerkProvider and runs clerkMiddleware, so it
          # needs real Clerk keys just to boot — and on a development instance a
          # real browser is bounced through a dev-browser handshake before any
          # page renders. The suite runs anonymously (no sign-in), but a Clerk
          # Testing Token waves the browser past that handshake; global-setup.ts
          # fetches it and e2e/fixtures.ts applies it. These are the *development*
          # instance keys (publishable is public anyway; the secret is a repo
          # secret). The opt-in signed-in test (settings-auth.spec.ts) stays
          # skipped unless E2E_CLERK_AUTH is set, which CI does not set.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
