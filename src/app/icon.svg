<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- The mark: two footprints walking up the app's green — one step at a time.
       Drawn as paths rather than the 👣 emoji so it stays crisp and on-palette
       at 16px, where an emoji glyph turns to mud. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#3fae6e" />
      <stop offset="1" stop-color="#2c8a53" />
    </linearGradient>
  </defs>
  <!-- Full-bleed: the green fills the whole square with no rounded (transparent)
       corners of its own, so a light host tile can't peek through the corners as
       white on a dark background. Hosts that want rounded corners mask the icon
       themselves. -->
  <rect width="64" height="64" fill="url(#g)" />
  <g fill="#ffffff">
    <g transform="translate(23 44) rotate(-16)">
      <ellipse cx="0" cy="2" rx="6.4" ry="9" />
      <circle cx="-4.6" cy="-9.4" r="2.5" />
      <circle cx="0.6" cy="-11.2" r="2.3" />
      <circle cx="5.4" cy="-9.6" r="2" />
    </g>
    <g transform="translate(41 26) rotate(16) scale(-1 1)">
      <ellipse cx="0" cy="2" rx="6.4" ry="9" />
      <circle cx="-4.6" cy="-9.4" r="2.5" />
      <circle cx="0.6" cy="-11.2" r="2.3" />
      <circle cx="5.4" cy="-9.6" r="2" />
    </g>
  </g>
</svg>
